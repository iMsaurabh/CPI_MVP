# nginx.conf configures Nginx to serve the React frontend
# and proxy API calls to the backend service.

server {
    listen 80;
    server_name localhost;

    # root directory where static files are served from
    root /usr/share/nginx/html;
    index index.html;

    # serve static assets with caching
    # assets/ contains hashed filenames so aggressive caching is safe
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # proxy API calls to backend service
    # backend is the service name in docker-compose.yml
    # Docker internal DNS resolves service names automatically
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # proxy health check to backend
    location /health {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # serve index.html for all other routes
    # required for React Router — all routes must return index.html
    # React handles routing client-side from there
    location / {
        try_files $uri $uri/ /index.html;
    }
}